# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: mcp-tutorial-website
metadata:
  template: azd-init

services:
  web:
    project: .
    language: js
    host: staticwebapp
    # Standalone (root) deploy. To deploy as a hub module instead, run
    # `npm run build:module` and publish the generated `dist/` folder behind the
    # hub's Front Door route for `<NEXT_PUBLIC_BASE_PATH>/*`. See README.
    dist: out
